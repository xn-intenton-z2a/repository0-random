<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <meta property="og:title" content="repository0">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .identity dt { font-weight: bold; color: #666; }
    .identity dd { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    #demo-output { background: #fff; color: #111; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .demo-card { background: #fff; border: 1px solid #eee; padding: 1rem; border-radius: 6px; }
    .demo-card h3 { margin: 0 0 0.5rem 0; font-size: 1rem; }
    .demo-value { font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>String Utilities Demo</h2>
  <div id="demo-output">Loading library...</div>

  <div class="demo-grid" id="demo-grid" style="display:none"></div>

  <h2>About</h2>
  <p>This website uses the library. See <a href="https://github.com/xn-intenton-z2a/repository0">the repository</a> for source code and mission details.</p>
  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';

      const demoData = {
        slugify: lib.slugify('Hello World!'),
        truncate: lib.truncate('Hello World', 8),
        camelCase: lib.camelCase('foo-bar-baz'),
        kebabCase: lib.kebabCase('fooBarBaz'),
        titleCase: lib.titleCase('hello world'),
        wordWrap: lib.wordWrap('The quick brown fox jumps over the lazy dog', 12),
        stripHtml: lib.stripHtml('<p>Hello &amp; <strong>World</strong></p>'),
        escapeRegex: lib.escapeRegex('^hello.$'),
        pluralize: lib.pluralize('baby'),
        levenshtein: lib.levenshtein('kitten', 'sitting')
      };

      document.getElementById('demo-output').textContent = JSON.stringify(demoData, null, 2);

      const grid = document.getElementById('demo-grid');
      for (const [k, v] of Object.entries(demoData)) {
        const card = document.createElement('div');
        card.className = 'demo-card';
        const h3 = document.createElement('h3');
        h3.textContent = k;
        const pre = document.createElement('div');
        pre.className = 'demo-value';
        pre.textContent = typeof v === 'string' ? v : JSON.stringify(v);
        card.appendChild(h3);
        card.appendChild(pre);
        grid.appendChild(card);
      }
      grid.style.display = 'grid';

      document.title = name + ' v' + version;
    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
