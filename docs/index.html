<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>repository0 — Plot Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 1000px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .panel { background: #f6f8fa; padding: 1rem; border-radius: 6px; }
    #demo-output { background: #fff; padding: 1rem; border-radius: 6px; white-space: pre-wrap; }
    svg { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <p id="lib-version">loading...</p>

  <div class="grid">
    <div class="panel">
      <h2>Expression Demo</h2>
      <p>Parse and render y = sin(x) over -3.14:0.01:3.14</p>
      <div id="plot-area">Rendering...</div>
    </div>
    <div class="panel">
      <h2>Identity</h2>
      <div id="demo-output">Loading...</div>
    </div>
  </div>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      document.getElementById('lib-name').textContent = lib.name;
      document.getElementById('lib-version').textContent = `v${lib.version} — ${lib.description || '(no description)'}`;

      const fn = lib.parseExpression('y=Math.sin(x)');
      const { start, step, end } = lib.parseRange('-3.14:0.01:3.14');
      const series = lib.evaluateRange(fn, start, step, end);
      const svg = lib.renderSVG(series, { width: 720, height: 240, stroke: '#007acc' });
      const plotArea = document.getElementById('plot-area');
      plotArea.innerHTML = svg;

      document.getElementById('demo-output').textContent = JSON.stringify(lib.getIdentity(), null, 2);
    } catch (e) {
      document.getElementById('plot-area').textContent = 'Failed to load demo: ' + e.message;
    }
  </script>
</body>
</html>
